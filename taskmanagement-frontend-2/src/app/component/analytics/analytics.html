<div class="bg-white rounded-lg shadow border p-6 mb-6 h-screen flex flex-col">
    <!-- Header -->
    <div class="flex items-center justify-between mb-6">
        <h2 class="text-lg font-semibold text-gray-800">Analytics Overview</h2>
        <button
            class="text-sm border border-blue-500 text-blue-600 px-3 py-1 rounded hover:bg-blue-50 transition cursor-pointer"
            (click)="onHideAnalytics()">
            Hide Analytics
        </button>
    </div>

    <!-- Summary Cards -->
    <div class="grid grid-cols-5 gap-4 mb-8">
        <div class="bg-blue-50 border-t-4 border-blue-500 rounded p-4 text-center">
            <p class="text-xl font-bold text-blue-700">{{ completionRate }}%</p>
            <p class="text-xs text-gray-600">Completion Rate</p>
        </div>
        <div class="bg-red-50 border-t-4 border-red-500 rounded p-4 text-center">
            <p class="text-xl font-bold text-red-700">{{ overdueCount }}</p>
            <p class="text-xs text-gray-600">Overdue Tasks</p>
        </div>
        <div class="bg-orange-50 border-t-4 border-orange-500 rounded p-4 text-center">
            <p class="text-xl font-bold text-orange-700">{{ dueToday }}</p>
            <p class="text-xs text-gray-600">Due Today</p>
        </div>
        <div class="bg-green-50 border-t-4 border-green-500 rounded p-4 text-center">
            <p class="text-xl font-bold text-green-700">{{ tasksThisWeek }}</p>
            <p class="text-xs text-gray-600">This Week</p>
        </div>
        <div class="bg-purple-50 border-t-4 border-purple-500 rounded p-4 text-center">
            <p class="text-xl font-bold text-purple-700">{{ totalTasks }}</p>
            <p class="text-xs text-gray-600">Total Tasks</p>
        </div>
    </div>

    <!-- Charts (fills remaining viewport height) -->
    <div class="grid grid-cols-2 gap-6 flex-1">
        <!-- Pie Chart -->
        <div class="bg-gray-50 rounded-lg p-6 shadow-sm flex flex-col h-full">
            <h3 class="text-sm font-semibold mb-4">Task Status Breakdown</h3>
            <!-- This grows to fill the card -->
            <div class="flex-1">
                <canvas baseChart [data]="pieChartData" [type]="'pie'" [options]="fullHeightChartOptions">
                </canvas>
            </div>
        </div>

        <!-- Bar Chart -->
        <div class="bg-gray-50 rounded-lg p-6 shadow-sm flex flex-col h-full">
            <h3 class="text-sm font-semibold mb-4">Tasks by Priority</h3>
            <div class="flex-1">
                <canvas baseChart [data]="barChartData" [type]="'bar'" [options]="fullHeightChartOptions">
                </canvas>
            </div>
        </div>
    </div>
</div>
